<div
  class="min-h-screen bg-neo-bg flex items-center justify-center p-4 font-sans text-neo-black"
>
  <div class="w-full max-w-md bg-white border-4 border-neo-black p-8 shadow-neo">
    <h1 class="text-4xl font-black mb-6 text-center">
      {{ isLoginMode() ? "Inicia Sesión" : "Regístrate" }}
    </h1>

    <h2 class="text-xl font-bold mb-6 text-center text-gray-700">Digital Tech SIM</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col space-y-2">
      <neo-field label="Usuario" error="getError('username', 'El usuario es requerido')">
        <input neoInput type="text" formControlName="username" />
      </neo-field>

      <neo-field
        label="Contraseña"
        error="getError('password', 'La contraseña es requerida')"
      >
        <input neoInput type="password" formControlName="password" />
      </neo-field>

      <div class="min-h-14 flex items-center justify-center">
        @if (errorMensaje()) {
          <span
            class="w-full block text-red-500 font-bold mt-2 bg-red-100 p-2 border-2 border-red-500"
          >
            {{ errorMensaje() }}
          </span>
        }
      </div>

      <button neoButton type="submit" [disabled]="loading()" class="w-full text-xl py-3">
        {{ loading() ? "Cargando..." : isLoginMode() ? "Entrar" : "Registrarme" }}
      </button>
    </form>

    <div class="mt-8 text-center border-t-4 border-neo-black pt-4">
      <p class="font-bold">
        {{ isLoginMode() ? "¿No tienes cuenta?" : "¿Ya tienes una cuenta?" }}
        <button
          type="button"
          (click)="switchMode()"
          class="text-neo-primary underline hover:text-red-800"
        >
          {{ isLoginMode() ? "Crea una aquí" : "Inicia Sesión" }}
        </button>
      </p>
    </div>
  </div>
</div>
