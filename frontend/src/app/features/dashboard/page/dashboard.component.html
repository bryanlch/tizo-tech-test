<div class="p-8">
  <h2 class="text-4xl font-black mb-6">Dashboard Principal</h2>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    @for (card of cards; track $index) {
      <a
        neoButton
        [variant]="card.color || 'default'"
        size="lg"
        routerLink="{{ card.path }}"
      >
        <div class="flex items-center justify-between mb-4">
          <span class="text-3xl">{{ card.emoji }}</span>
          <h3 class="text-2xl font-black">{{ card.label }}</h3>
        </div>
        <p class="font-bold text-lg">{{ card.description }}</p>
      </a>
    }
  </div>
</div>
