<div class="w-full max-w-md bg-neo-primary border-4 border-black shadow-neo-lg p-6">
  <label
    class="inline-block bg-black text-white px-4 py-2 text-xs font-black uppercase mb-3 italic shadow-neo"
  >
    {{ label() }}
  </label>

  <div class="flex">
    <select
      (change)="onSelect($event)"
      class="grow bg-white border-4 border-black text-md font-black p-3 focus:outline-none focus:bg-yellow-200 transition-colors cursor-pointer appearance-none"
    >
      <option value="" disabled selected>-- ELEGIR SEDE --</option>
      @for (branch of branches(); track branch.id) {
        <option [value]="branch.id">{{ branch.name | uppercase }}</option>
      }
    </select>

    <div
      class="bg-black flex items-center justify-center px-3 border-y-4 border-r-4 border-black text-white"
    >
      <span class="text-xl">▼</span>
    </div>
  </div>

  @if (note()) {
    <div class="mt-8">
      <div class="bg-white border-2 border-black p-4 shadow-neo -rotate-1">
        <p class="text-xs md:text-lg font-semibold leading-tight">
          <span class="bg-red-500 text-white px-1 mr-1 font-black italic uppercase"
            >Importante:</span
          >
          {{ note() }}
        </p>
      </div>
    </div>
  }
</div>
