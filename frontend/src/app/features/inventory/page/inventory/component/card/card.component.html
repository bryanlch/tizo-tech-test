<div class="bg-white border-4 border-neo-black shadow-neo p-4 space-y-4">
  <div class="flex justify-between items-start">
    <div>
      <p class="text-xs font-mono text-gray-500">{{ product.sku }}</p>
      <p class="text-lg font-black">{{ product.name }}</p>
    </div>

    <span
      class="flex items-center justify-center bg-neo-accent border-4 border-neo-black w-14 h-10 text-xl font-black"
    >
      @if (loading) {
      <span class="animate-spin text-sm">⏳</span>
      } @else { {{ quantity }} }
    </span>
  </div>

  <div class="flex justify-center gap-4">
    <button
      (click)="decrease(product)"
      [disabled]="quantity <= 0 || loading"
      class="bg-neo-pink text-neo-black text-2xl font-black w-12 h-12 border-4 border-neo-black"
    >
      -
    </button>

    <button
      (click)="increase(product)"
      [disabled]="loading"
      class="bg-neo-green text-neo-black text-2xl font-black w-12 h-12 border-4 border-neo-black"
    >
      +
    </button>
  </div>
</div>
