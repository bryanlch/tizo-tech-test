<div class="bg-white border-4 border-neo-black shadow-neo overflow-x-auto">
  <table class="w-full text-left font-sans">
    <thead>
      <tr class="bg-neo-black text-white border-b-4 border-neo-black">
        <th class="p-4 text-xl font-black">SKU</th>
        <th class="p-4 text-xl font-black">Producto</th>
        <th class="p-4 text-xl font-black text-center">Stock</th>
        <th class="p-4 text-xl font-black text-center">Ajuste</th>
      </tr>
    </thead>

    <tbody>
      @for (prod of products; track prod.id) {
        <tr class="border-b-2 border-dashed border-gray-400 hover:bg-neo-bg">
          <td class="p-4 font-mono font-bold">
            {{ prod.sku }}
          </td>

          <td class="p-4 font-black text-lg">
            {{ prod.name }}
          </td>

          <td class="p-4 text-center">
            <span
              class="inline-flex items-center justify-center bg-neo-accent border-4 border-neo-black w-16 h-12 text-2xl font-black"
            >
              @if (updatingStockFor === prod.id) {
                <span class="animate-spin text-sm">⏳</span>
              } @else {
                {{ getQuantity(prod.id!) }}
              }
            </span>
          </td>

          <td class="p-4">
            <div class="flex justify-center gap-3">
              <button
                (click)="decrease(prod)"
                [disabled]="getQuantity(prod.id!) <= 0"
                class="bg-neo-pink text-neo-black text-2xl font-black w-12 h-12 border-4 border-neo-black"
              >
                -
              </button>

              <button
                (click)="increase(prod)"
                class="bg-neo-green text-neo-black text-2xl font-black w-12 h-12 border-4 border-neo-black"
              >
                +
              </button>
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
